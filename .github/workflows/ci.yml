name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: エンジンの自動テスト
        run: node tests/run-tests.js

      - name: JS構文チェック
        run: |
          node -e "
            const fs=require('fs');
            const html=fs.readFileSync('index.html','utf8');
            // 素の<script>ブロック（外部src付きは除く）を全て抽出して個別に構文チェックする。
            // 旧実装は貪欲マッチで複数ブロックを1つに巻き込み</script>混入で誤検知していた。
            const blocks=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
            if(!blocks.length){console.error('script block not found');process.exit(1);}
            blocks.forEach((m,i)=>fs.writeFileSync('/tmp/app'+i+'.js', m[1]));
            console.log('checked script blocks:', blocks.length);
          "
          for f in /tmp/app*.js; do node --check "$f"; done

      - name: 描画スモークテスト（ヘッドレスChrome）
        run: |
          google-chrome --headless --disable-gpu --no-sandbox \
            --virtual-time-budget=8000 --dump-dom "file://$PWD/index.html" > /tmp/rendered.html
          # 初期化JSが最後まで完走したことを確認（実行時エラー検知）
          grep -q "sim-sum" /tmp/rendered.html
          grep -q "理想額/月" /tmp/rendered.html
          test "$(grep -c '<tr' /tmp/rendered.html)" -gt 100
          echo "描画OK"
